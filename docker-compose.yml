version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medstudy_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-medstudy}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - medstudy-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-medstudy}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  medstudy-pgdata:

spring:
  datasource:
    url: jdbc:h2:mem:medstudy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false # Disable Flyway in H2 tests to avoid SQL syntax issues

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY=
  expiration: 3600000

# Mock Mail for tests
  mail:
    host: localhost
    port: 25

rate:
  limit:
    auth: 5
    user: 20
    anonymous: 7

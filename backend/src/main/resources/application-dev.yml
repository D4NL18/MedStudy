spring:
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://127.0.0.1:${DB_PORT:5433}/${DB_NAME:medstudy}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAILTRAP_USER:mock_user}
    password: ${MAILTRAP_PASS:mock_pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  max-http-header-size: 1MB

jwt:
  secret: ${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY=}
  expiration: 14400000

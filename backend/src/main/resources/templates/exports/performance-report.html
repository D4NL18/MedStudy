<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #6F0642;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #6F0642;
            margin: 0;
            font-size: 24px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #430428;
            margin-bottom: 15px;
            border-left: 4px solid #6F0642;
            padding-left: 10px;
        }
        .metrics-grid {
            width: 100%;
            margin-bottom: 30px;
        }
        .metric-card {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            width: 20%;
            display: inline-block;
            margin-right: 2%;
        }
        .metric-value {
            font-size: 20px;
            font-weight: bold;
            color: #6F0642;
        }
        .metric-label {
            font-size: 12px;
            color: #666;
        }
        .charts-container {
            text-align: center;
        }
        .chart-box {
            display: inline-block;
            width: 45%;
            margin: 10px;
            border: 1px solid #eee;
            padding: 10px;
        }
        .chart-img {
            width: 100%;
            height: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #6F0642;
            color: white;
            padding: 10px;
            text-align: left;
            font-size: 12px;
        }
        td {
            border-bottom: 1px solid #eee;
            padding: 8px;
            font-size: 12px;
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 th:text="${title}">Relatório de Desempenho - MedStudy</h1>
    <p th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></p>
</div>

<div class="section">
    <div class="section-title">Resumo Geral</div>
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-value" th:text="${metrics.totalQuestoes}">0</div>
            <div class="metric-label">Questões</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" th:text="${#numbers.formatDecimal(metrics.mediaAcertos, 1, 1) + '%'}">0%</div>
            <div class="metric-label">Média de Acerto</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" th:text="${metrics.totalSessoes}">0</div>
            <div class="metric-label">Sessões</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" th:text="${metrics.streak}">0</div>
            <div class="metric-label">Streak (Dias)</div>
        </div>
    </div>
</div>

<div class="section" th:if="${charts != null}">
    <div class="section-title">Análise Visual</div>
    <div class="charts-container">
        <div class="chart-box" th:if="${charts.containsKey('performanceArea')}">
            <div class="metric-label">Desempenho por Área</div>
            <img class="chart-img" th:src="${charts.get('performanceArea')}"/>
        </div>
        <div class="chart-box" th:if="${charts.containsKey('evolution')}">
            <div class="metric-label">Evolução Mensal</div>
            <img class="chart-img" th:src="${charts.get('evolution')}"/>
        </div>
    </div>
</div>

<div class="footer">
    Gerado automaticamente pela plataforma MedStudy. Todos os direitos reservados.
</div>

</body>
</html>

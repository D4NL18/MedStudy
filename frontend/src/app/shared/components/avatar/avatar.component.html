<div class="avatar-circle" [ngStyle]="getStyles()" [ngClass]="size">
      <div class="avatar-glow" [ngStyle]="getGlowStyles()"></div>
      
      <!-- Show uploaded image if exists -->
      <img *ngIf="pictureUrl" [src]="pictureUrl" alt="Avatar" class="avatar-image" />
      
      <!-- Show preset icon if no image -->
      <div class="avatar-icon-wrap" *ngIf="!pictureUrl">
        <lucide-icon [name]="getLucideIconName()"></lucide-icon>
      </div>
    </div>

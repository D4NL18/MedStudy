<div class="study-overlay" *ngIf="active$ | async">
  <div class="header">
    <div class="progress-info">
      <span class="count">Card {{ (currentIndex$ | async)! + 1 }} de {{ (queue$ | async)?.length }}</span>
      <div class="progress-bar">
        <div class="fill" [style.width.%]="getProgress((currentIndex$ | async)!, (queue$ | async)?.length || 0)"></div>
      </div>
    </div>
    <button class="close-btn" (click)="close()">
      <lucide-icon name="x" [size]="24"></lucide-icon>
    </button>
  </div>

  <!-- Card State -->
  <div class="card-container" *ngIf="currentCard$ | async as card">
    <div class="flashcard" [class.is-flipped]="isFlipped()" (click)="flip()">
      <div class="card-face front">
        <div class="card-label">Pergunta</div>
        <div class="content-wrapper">
          <app-markdown-renderer [data]="card.frente"></app-markdown-renderer>
        </div>
        <div class="flip-hint">
          <lucide-icon name="rotate-cw" [size]="16"></lucide-icon>
          Clique para girar
        </div>
      </div>
      <div class="card-face back">
        <div class="card-label">Resposta</div>
        <div class="content-wrapper">
          <app-markdown-renderer [data]="card.verso"></app-markdown-renderer>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions result-step" *ngIf="(currentCard$ | async) && isFlipped() && !hasResult()">
    <button class="result-btn wrong" (click)="setResult(true)">
      <lucide-icon name="x-circle" [size]="32"></lucide-icon>
      <span>Errei</span>
    </button>
    <button class="result-btn correct" (click)="setResult(false)">
      <lucide-icon name="check-circle" [size]="32"></lucide-icon>
      <span>Acertei</span>
    </button>
  </div>

  <div class="actions difficulty-step" *ngIf="(currentCard$ | async) && hasResult()">
    <button class="diff-btn hard" (click)="rate('HARD')">
      <lucide-icon name="alert-triangle" [size]="24"></lucide-icon>
      <span>Difícil</span>
    </button>
    <button class="diff-btn medium" (click)="rate('MEDIUM')">
      <lucide-icon name="clock" [size]="24"></lucide-icon>
      <span>Médio</span>
    </button>
    <button class="diff-btn easy" (click)="rate('EASY')">
      <lucide-icon name="check" [size]="24"></lucide-icon>
      <span>Fácil</span>
    </button>
  </div>

  <!-- Empty State -->
  <div class="no-cards" *ngIf="isEmpty$ | async">
    <h3>Nada por aqui!</h3>
    <p>Você não tem cards para revisar hoje. Ótimo trabalho!</p>
    <button class="finish-btn" (click)="close()">Voltar</button>
  </div>

  <!-- Finished State -->
  <div class="no-cards" *ngIf="isSessionOver$ | async">
    <h3>Sessão Finalizada!</h3>
    <p>Você revisou todos os cartões desta sessão.</p>
    <button class="finish-btn" (click)="close()">Concluir</button>
  </div>

  <div class="loading-state" *ngIf="loading$ | async">
    <div class="spinner"></div>
    <p>Preparando seus cards...</p>
  </div>
</div>

<app-modal-layout [title]="isEdit ? 'Editar Flashcard' : 'Novo Flashcard'" [loading]="loading" (close)="cancel()" (save)="save()">
  <div class="field-group">
    <label>Grande Área</label>
    <select [(ngModel)]="grandeArea">
      <option *ngFor="let area of areas" [value]="area">{{ area }}</option>
    </select>
  </div>

  <div class="editors-grid">
    <div class="editor-column">
      <div class="label-row">
        <span class="dot blue"></span>
        <label>Frente (Pergunta)</label>
      </div>
      <div class="rich-editor" 
           #frenteEditor
           contenteditable="true"
           appImagePaste
           (imagePasted)="onImagePasted($event, 'frente')"
           placeholder="Digite o texto ou cole uma imagem...">
      </div>
      <app-button variant="btn-action" (onClick)="triggerImageUpload('frente')" aria-label="Upload de imagem para a frente">
        <lucide-icon name="image" [size]="18"></lucide-icon>
        Inserir Imagem
      </app-button>
      <p class="hint">💡 Ou cole com Ctrl+V / arraste uma imagem</p>
    </div>

    <div class="editor-column">
      <div class="label-row">
        <span class="dot green"></span>
        <label>Verso (Resposta)</label>
      </div>
      <div class="rich-editor" 
           #versoEditor
           contenteditable="true"
           appImagePaste
           (imagePasted)="onImagePasted($event, 'verso')"
           placeholder="Digite a resposta ou cole uma imagem...">
      </div>
      <app-button variant="btn-action" (onClick)="triggerImageUpload('verso')" aria-label="Upload de imagem para o verso">
        <lucide-icon name="image" [size]="18"></lucide-icon>
        Inserir Imagem
      </app-button>
      <p class="hint">💡 Ou cole com Ctrl+V / arraste uma imagem</p>
    </div>
  </div>
</app-modal-layout>

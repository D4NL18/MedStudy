<div class="chart-container" #containerRef>
  <ngx-charts-line-chart *ngIf="containerRef.offsetWidth > 0"
    [view]="[containerRef.offsetWidth, 300]"
    [scheme]="colorScheme()"
    [results]="chartData"
    [gradient]="true"
    [xAxis]="true"
    [yAxis]="true"
    [legend]="false"
    [showXAxisLabel]="true"
    [showYAxisLabel]="true"
    [xAxisLabel]="'Meses'"
    [yAxisLabel]="'% Acerto'"
    [autoScale]="true"
    [curve]="curve"
  >
  </ngx-charts-line-chart>
</div>

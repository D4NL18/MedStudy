<div class="analytics-page" #containerRef>
  <header>
    <h2>Desempenho por Tema</h2>
    <p>Visão granular do seu conhecimento em cada tópico.</p>
  </header>

  <div class="table-container glass">
    <table>
      <thead>
        <tr>
          <th>Tema</th>
          <th>Área</th>
          <th>Questões</th>
          <th>Acerto (%)</th>
          <th>Sessões</th>
        </tr>
      </thead>
      <tbody>
        @if (loading()) {
          <tr *ngFor="let i of [1,2,3,4,5]">
            <td colspan="5"><div class="skeleton-row"></div></td>
          </tr>
        } @else {
          <tr *ngFor="let topic of topics()">
            <td class="theme-name" data-label="Tema">{{ topic.tema }}</td>
            <td data-label="Área"><span class="badge">{{ topic.grandeArea }}</span></td>
            <td data-label="Questões">{{ topic.totalQuestions }}</td>
            <td data-label="Acerto (%)">
              <div class="accuracy-cell">
                <div class="progress-bar">
                  <div class="fill" [style.width.%]="topic.accuracy" [class]="getAccClass(topic.accuracy)"></div>
                </div>
                <span>{{ topic.accuracy | number:'1.0-0' }}%</span>
              </div>
            </td>
            <td data-label="Sessões">{{ topic.sessionsCount }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

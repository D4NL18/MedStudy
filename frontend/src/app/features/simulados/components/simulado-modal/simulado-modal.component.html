<app-modal-layout 
  title="Registrar Novo Simulado" 
  [loading]="loading()"
  (close)="onClose()"
  (save)="onSave()">

  <form [formGroup]="simuladoForm" class="simulado-form">
    <!-- Header Summary -->
    <div class="summary-card glass">
      <div class="summary-item">
        <span class="label">Total Questões</span>
        <span class="value">{{ totals().totalQuestoes }}</span>
      </div>
      <div class="summary-item highlight">
        <span class="label">Total Acertos</span>
        <span class="value">{{ totals().totalAcertos }}</span>
      </div>
      <div class="summary-item">
        <span class="label">Aproveitamento</span>
        <span class="value accent">{{ totals().percent }}%</span>
      </div>
    </div>

    <!-- General Info -->
    <div class="form-section">
      <div class="form-group">
        <label>Nome da Prova</label>
        <input type="text" formControlName="nome" placeholder="Ex: USP 2024 / Simulado MedCurso 01" class="glass-input">
      </div>
      
      <div class="form-grid">
        <div class="form-group">
          <label>Instituição</label>
          <input type="text" formControlName="instituicao" placeholder="Ex: SES-SP" class="glass-input">
        </div>
        
        <div class="form-group">
          <label>Ano</label>
          <input type="text" formControlName="ano" inputmode="numeric" placeholder="2024" class="glass-input">
        </div>

        <div class="form-group">
          <label>Data de Realização</label>
          <input type="date" formControlName="data" class="glass-input">
          <div class="error" *ngIf="simuladoForm.get('data')?.touched && simuladoForm.get('data')?.errors?.['futureDate']">
            ⚠️ Não é permitido datas futuras.
          </div>
        </div>
      </div>
    </div>

    <!-- Performance by Area -->
    <div class="performance-section">
      <h3>Desempenho por Área</h3>
      <div formArrayName="performance" class="areas-grid">
        <div *ngFor="let group of performanceArray.controls; let i = index" [formGroupName]="i" class="area-card glass">
          <div class="area-header">
            <div class="area-icon">
              {{ i === 0 ? '🔪' : i === 1 ? '🩺' : i === 2 ? '👶' : i === 3 ? '🤰' : '🏥' }}
            </div>
            <span class="area-name">{{ areas[i].name }}</span>
          </div>
          <div class="area-inputs">
            <div class="input-pair">
              <label>Total</label>
              <input type="number" formControlName="totais" class="mini-input">
            </div>
            <div class="input-pair">
              <label>Acertos</label>
              <input type="number" formControlName="acertos" class="mini-input">
            </div>
          </div>
          <div class="error" *ngIf="group.touched && group.errors?.['acertosInvalidos']">
            ⚠️ Acertos > Total
          </div>
        </div>
      </div>
    </div>
  </form>

</app-modal-layout>
